name: Nagoya Weather Discord Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 21 * * *"

jobs:
  post-weather:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Post Nagoya weather to Discord
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          WEATHER_LOCATION_NAME: Nagoya
          WEATHER_LATITUDE: "35.1815"
          WEATHER_LONGITUDE: "136.9066"
          WEATHER_TIMEZONE: Asia/Tokyo
        run: node ./send_nagoya_weather_to_discord.mjs

      - name: Post Fukuoka weather to Discord
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          WEATHER_LOCATION_NAME: Fukuoka
          WEATHER_LATITUDE: "33.5902"
          WEATHER_LONGITUDE: "130.4017"
          WEATHER_TIMEZONE: Asia/Tokyo
        run: node ./send_nagoya_weather_to_discord.mjs

      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
        run: node ./send_action_failure_notification.mjs
