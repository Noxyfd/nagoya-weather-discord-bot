name: City Earthquake Discord Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  post-earthquake-alerts:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Check Nagoya and Fukuoka earthquakes
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
        run: node ./send_city_earthquake_alerts.mjs

      - name: Persist earthquake notification state
        run: |
          if [ -n "$(git status --porcelain earthquake_state.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add earthquake_state.json
            git commit -m "Update earthquake notification state"
            git push
          else
            echo "No earthquake state changes to commit."
          fi
